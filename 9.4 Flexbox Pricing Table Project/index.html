<!DOCTYPE html>
<html>

<head>
  <title>Flexbox Pricing Table</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Sono', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }   
    .pricing-container{
      display: flex;
      flex-direction: row;
      justify-content: center;
      text-align: center;
      gap: 20px;
    }

    .pricing-plan{
      color: beige;
      background-color: #a1a2ff;
      padding: 10px;
      border-radius: 10%;
      line-height: 2;
      width: 230px;
    }
    
    ul {
     list-style: none;
     padding: 0; /* also removes the default left indent */
     margin: 0;
    }
   
    .plan-features{
      font-size: 10px;
    }

    .plan-title{
      font-weight: bold;
      color: white;
    }

    .plan-price{
      font-weight: bolder;
      font-size: 25px;
    }

    .line{
      width: 100px;
      background-color: #333;
    }
    
    .plan-button{
      margin-top: 15px;
      color: white;
      background-color: #6440ada4 ;
      border-radius: 8px;
      border:none;
      padding: 5px;
      font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
    }

    @media (max-width: 1250px) {
    .pricing-container{
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    }
  </style>
</head>

<body>
  <div class="pricing-container">
    <div class="pricing-plan">
      <div class="plan-title">Basic <hr class="line"> </div>
      <div class="plan-price">$9.99/month</div>
      <ul class="plan-features">
        <li>✅ 10GB Storage</li>
        <li>✅ 1 User</li>
        <li>🚫 Support</li>
      </ul>
      <button class="plan-button">Sign Up</button>
    </div>
    <div class="pricing-plan">
      <div class="plan-title">Standard <hr class="line"> </div>
      <div class="plan-price">$19.99/month</div>
      <ul class="plan-features">
        <li>✅ 50GB Storage</li>
        <li>✅ 5 Users</li>
        <li>✅ Phone &amp; Email Support</li>
      </ul>
      <button class="plan-button">Sign Up</button>
    </div>
    <div class="pricing-plan">
      <div class="plan-title">Premium<hr class="line"> </div>
      <div class="plan-price">$49.99/month</div>
      <ul class="plan-features">
        <li>✅ 100GB Storage</li>
        <li>✅ 10 Users</li>
        <li>✅ 24/7 Support</li>
      </ul>
      <button class="plan-button">Sign Up</button>
    </div>
  </div>

</body>

</html>
